<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>时间范围解析器</title>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --border: #334155;
            --text: #e2e8f0;
            --muted: #94a3b8;
            --accent: #6366f1;
            --accent-hover: #818cf8;
            --success: #22c55e;
            --danger: #ef4444;
            --radius: 12px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 640px;
        }

        .header {
            text-align: center;
            margin-bottom: 32px;
        }

        .header h1 {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, #6366f1, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header p {
            color: var(--muted);
            margin-top: 8px;
            font-size: 14px;
        }

        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 24px;
        }

        .input-group {
            display: flex;
            gap: 12px;
        }

        .input-group input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            background: var(--bg);
            color: var(--text);
            font-size: 16px;
            outline: none;
            transition: border-color 0.2s;
        }

        .input-group input:focus {
            border-color: var(--accent);
        }

        .input-group input::placeholder {
            color: #64748b;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: var(--radius);
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-primary {
            background: var(--accent);
            color: #fff;
        }

        .btn-primary:hover {
            background: var(--accent-hover);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .examples {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 16px;
        }

        .example-tag {
            padding: 6px 14px;
            border: 1px solid var(--border);
            border-radius: 20px;
            background: transparent;
            color: var(--muted);
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .example-tag:hover {
            border-color: var(--accent);
            color: var(--accent-hover);
        }

        .result {
            margin-top: 24px;
            display: none;
        }

        .result.visible {
            display: block;
        }

        .result-card {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px;
        }

        .result-row {
            display: flex;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid var(--border);
        }

        .result-row:last-child {
            border-bottom: none;
        }

        .result-label {
            width: 80px;
            color: var(--muted);
            font-size: 13px;
            flex-shrink: 0;
        }

        .result-value {
            font-family: "SF Mono", "Fira Code", "Cascadia Code", monospace;
            font-size: 14px;
            color: var(--success);
        }

        .result-value.desc {
            font-family: inherit;
            color: var(--text);
        }

        .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid var(--border);
            border-top: 2px solid var(--accent);
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            display: inline-block;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .error {
            color: var(--danger);
            font-size: 14px;
            margin-top: 12px;
            display: none;
        }

        .error.visible {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>⏱️ 时间范围解析器</h1>
            <p>基于 DeepSeek AI，将自然语言时间表达转为标准格式</p>
        </div>

        <div class="card">
            <div class="input-group">
                <input type="text" id="timeInput" placeholder="输入自然语言时间，如：最近一周、上个月、今年上半年..."
                    autocomplete="off">
                <button class="btn btn-primary" id="parseBtn" onclick="parseTime()">解析</button>
            </div>

            <div class="examples">
                <span style="color:var(--muted);font-size:13px;line-height:32px;">试试：</span>
                <button class="example-tag" onclick="quickParse('最近一周')">最近一周</button>
                <button class="example-tag" onclick="quickParse('上个月')">上个月</button>
                <button class="example-tag" onclick="quickParse('今年上半年')">今年上半年</button>
                <button class="example-tag" onclick="quickParse('本周')">本周</button>
                <button class="example-tag" onclick="quickParse('昨天')">昨天</button>
                <button class="example-tag" onclick="quickParse('上季度')">上季度</button>
            </div>

            <div class="error" id="errorMsg"></div>

            <div class="result" id="result">
                <div class="result-card">
                    <div class="result-row">
                        <span class="result-label">原始输入</span>
                        <span class="result-value desc" id="resOriginal">-</span>
                    </div>
                    <div class="result-row">
                        <span class="result-label">起始时间</span>
                        <span class="result-value" id="resStart">-</span>
                    </div>
                    <div class="result-row">
                        <span class="result-label">结束时间</span>
                        <span class="result-value" id="resEnd">-</span>
                    </div>
                    <div class="result-row">
                        <span class="result-label">解释</span>
                        <span class="result-value desc" id="resDesc">-</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const input = document.getElementById('timeInput');
        const btn = document.getElementById('parseBtn');
        const result = document.getElementById('result');
        const errorMsg = document.getElementById('errorMsg');

        input.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') parseTime();
        });

        function quickParse(text) {
            input.value = text;
            parseTime();
        }

        async function parseTime() {
            const text = input.value.trim();
            if (!text) return;

            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span>';
            result.classList.remove('visible');
            errorMsg.classList.remove('visible');

            try {
                const res = await fetch('/api/time-range/parse', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ input: text })
                });

                if (!res.ok) {
                    throw new Error(`HTTP ${res.status}`);
                }

                const data = await res.json();

                if (!data.startTime) {
                    throw new Error(data.description || '无法解析该时间表达');
                }

                document.getElementById('resOriginal').textContent = data.original;
                document.getElementById('resStart').textContent = data.startTime;
                document.getElementById('resEnd').textContent = data.endTime;
                document.getElementById('resDesc').textContent = data.description;
                result.classList.add('visible');
            } catch (err) {
                errorMsg.textContent = '❌ ' + (err.message || '解析失败，请稍后重试');
                errorMsg.classList.add('visible');
            } finally {
                btn.disabled = false;
                btn.textContent = '解析';
            }
        }
    </script>
</body>
</html>
